<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    form {
      display: grid;
      gap: 0.75rem;
      border: 1px solid #ddd;
      padding: 1rem;
      border-radius: 8px;
    }

    input {
      padding: 0.5rem;
      font-size: 1rem;
    }

    button {
      padding: 0.6rem 1rem;
      width: fit-content;
      border: none;
      background: #0a66c2;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Student Registration Form</h1>
  <form action="/submit-form" method="POST">
    <label for="studentName">Student Name</label>
    <input id="studentName" name="studentName" type="text" required />

    <label for="branch">Branch</label>
    <input id="branch" name="branch" type="text" required />

    <label for="year">Year</label>
    <input id="year" name="year" type="text" required />

    <button type="submit">Submit</button>
  </form>
</body>
</html>
