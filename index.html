<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dev Experiments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --focus-ring: rgba(37, 99, 235, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 24px;
        }

        .header {
            margin-bottom: 48px;
            text-align: left;
        }

        .greeting-text {
            /* Applying the cool font here */
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            /* Using a sleek gradient to make it pop */
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .header p {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin: 0;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-card {
            display: flex;
            flex-direction: column;
            padding: 24px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .nav-card:hover, .nav-card:focus {
            outline: none;
            border-color: var(--text-muted);
            background-color: var(--hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .nav-card:focus-visible {
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .nav-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
        }

        .exp-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        @media (max-width: 480px) {
            .greeting-text {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- This ID allows JavaScript to target and change the text -->
            <h1 id="dynamic-greeting" class="greeting-text">Hello, Soham Agate Sir!</h1>
            <p>Select an experiment to view.</p>
        </div>

        <nav class="nav-list" aria-label="Experiments Navigation">
            <a href="exp1/" class="nav-card">
                <span class="exp-badge">Experiment 01</span>
                <h2 class="nav-title">Static Website Design</h2>
                <p class="nav-desc">A responsive storefront landing page built with semantic HTML and CSS.</p>
            </a>

            <a href="exp2/" class="nav-card">
                <span class="exp-badge">Experiment 02</span>
                <h2 class="nav-title">JavaScript Contact Manager</h2>
                <p class="nav-desc">Dynamic DOM manipulation, LocalStorage integration, and Promises simulation.</p>
            </a>
        </nav>
    </div>

    <!-- The JavaScript logic that controls the greeting -->
    <script>
        function updateGreeting() {
            // 1. Get the current hour of the day (returns a number between 0 and 23)
            const currentHour = new Date().getHours();
            
            // 2. Set the default greeting to Evening (if the hour is very late or very early)
            let timeGreeting = 'Good Evening';
            
            // 3. Simple logic to determine the time state
            if (currentHour >= 5 && currentHour < 12) {
                // Between 5 AM and 11:59 AM
                timeGreeting = 'Good Morning';
            } else if (currentHour >= 12 && currentHour < 18) {
                // Between 12 PM and 5:59 PM
                timeGreeting = 'Good Afternoon';
            }

            // 4. Combine the greeting with the specific name
            const finalMessage = `${timeGreeting}, Soham Agate Sir!`;

            // 5. Tell the DOM to overwrite the text of our H1 element with our new message
            document.getElementById('dynamic-greeting').innerText = finalMessage;
        }
        
        // Execute the function as soon as the page loads
        updateGreeting();
    </script>
</body>
</html>
