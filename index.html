<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dev Experiments</title>
    <style>
        :root {
            /* Minimalist UI/UX Palette */
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --focus-ring: rgba(37, 99, 235, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 24px;
        }

        .header {
            margin-bottom: 48px;
            text-align: left;
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.025em;
        }

        .header p {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin: 0;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-card {
            display: flex;
            flex-direction: column;
            padding: 24px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .nav-card:hover, .nav-card:focus {
            outline: none;
            border-color: var(--text-muted);
            background-color: var(--hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .nav-card:focus-visible {
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .nav-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
        }

        .exp-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Lab Repository</h1>
            <p>Select an experiment to view.</p>
        </div>

        <nav class="nav-list" aria-label="Experiments Navigation">
            <a href="exp1/" class="nav-card">
                <span class="exp-badge">Experiment 01</span>
                <h2 class="nav-title">Static Website Design</h2>
                <p class="nav-desc">A responsive storefront landing page built with semantic HTML and CSS.</p>
            </a>

            <a href="exp2/" class="nav-card">
                <span class="exp-badge">Experiment 02</span>
                <h2 class="nav-title">JavaScript Contact Manager</h2>
                <p class="nav-desc">Dynamic DOM manipulation, LocalStorage integration, and Promises simulation.</p>
            </a>
        </nav>
    </div>
</body>
</html>
